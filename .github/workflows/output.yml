name: output-demo

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.step1.outputs.version }}

    steps:
      - name: step one
        id: step1
        run: echo "version=0.0.1" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: deploy the app
        run: echo "deploy the version ${{ needs.build.outputs.version }}"
